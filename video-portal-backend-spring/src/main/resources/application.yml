server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

spring:
  datasource:
    url: jdbc:h2:file:./data/db/videoportal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

app:
  ffmpeg:
    path: ffmpeg
  storage:
    initial-upload-dir: ./data/initial_upload
    converted-dir: ./data/converted
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5173
      - http://127.0.0.1:5173


logging:
  level:
    org.hibernate.SQL: warn
